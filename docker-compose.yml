services:
  app:
    build:
      context: .
      dockerfile: deployments/compose/backend/Dockerfile
    command: /start
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
    restart: always
    volumes:
      - ./src:/app
    ports:
      - ${PORT:-8001}:8000
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend_network

  postgres:
    image: postgres:16
    env_file:
      - .env
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - ${POSTGRES_PORT:-5432}:5432
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend_network

  postgres-test:
    image: postgres:16-alpine
    profiles: ["test"]
    ports:
      - "25439:5432"
    env_file:
      - .env.test
    networks:
      - backend_network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER}" ]
      interval: 5s
      timeout: 5s
      retries: 5


volumes:
  pg_data:
    driver: local

networks:
  backend_network:
    driver: bridge
